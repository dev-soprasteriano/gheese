name: Bug report
description: Report a reproducible problem in gheese
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        If this is a **severe vulnerability**, do not open a public issue. Report it privately to `ospo.scandinavia+ghsecurity@soprasteria.com`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact steps needed to trigger the issue.
      placeholder: |
        1. Run `...`
        2. Run `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Which command were you running?
      placeholder: gheese repo list my-org
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste any relevant terminal output, error messages, or logs.
      render: shell
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Built from source
        - Installed from a release artifact
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of gheese are you using?
      placeholder: v0.3.0
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: If you built from source, which Go version did you use?
      placeholder: go version go1.26.1 darwin/arm64
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that would help investigate the issue?
